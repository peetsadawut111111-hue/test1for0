<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdrawal Dashboard V4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.header{
background:linear-gradient(135deg,#e53935,#ff6b6b);
color:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.header h1{
font-size:28px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

label{
display:block;
font-weight:600;
margin-bottom:8px;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#e53935;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result-card{
margin-top:20px;
display:none;
}

.summary{
text-align:center;
padding:30px;
border-radius:20px;
background:linear-gradient(135deg,#43a047,#66bb6a);
color:white;
}

.summary h2{
font-size:18px;
margin-bottom:10px;
}

.summary .amount{
font-size:42px;
font-weight:bold;
}

.status{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.vip{
color:#43a047;
}

.normal{
color:#e53935;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.info-box{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.info-box h3{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.info-box p{
font-size:22px;
font-weight:bold;
}

@media(max-width:600px){

.info{
grid-template-columns:1fr;
}

.summary .amount{
font-size:34px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>💰 ระบบคำนวณถอน V4</h1>
<p>คำนวณวงเงินถอนอัตโนมัติ</p>
</div>

<div class="card">

<label>ยอดฝากวันนี้ (บาท)</label>
<input type="number" id="depositToday" placeholder="กรอกยอดฝากวันนี้">

<label>ยอดฝากเดือนก่อน (บาท)</label>
<input type="number" id="lastMonth" placeholder="กรอกยอดฝากเดือนก่อน">

<button onclick="calculate()">
คำนวณวงเงินถอน
</button>

</div>

<div class="result-card" id="result">

<div class="summary">
<h2>วงเงินถอนสูงสุด</h2>
<div class="amount" id="approveAmount">0</div>
<div class="status" id="customerType"></div>
</div>

<div class="info">

<div class="info-box">
<h3>ยอดฝากวันนี้</h3>
<p id="showDeposit">0</p>
</div>

<div class="info-box">
<h3>สถานะลูกค้า</h3>
<p id="showStatus">-</p>
</div>

</div>

</div>

</div>

<script>

function calculate(){

let depositToday =
Number(document.getElementById("depositToday").value);

let lastMonth =
Number(document.getElementById("lastMonth").value);

let approve = 0;
let status = "";

if(lastMonth >= 35000){

status = "ลูกค้าฝากประจำ";
approve = depositToday * 5;

}else{

status = "ลูกค้าทั่วไป";
approve = depositToday * 3;

}

document.getElementById("approveAmount")
.innerHTML =
approve.toLocaleString()+" บาท";

document.getElementById("customerType")
.innerHTML = status;

document.getElementById("showDeposit")
.innerHTML =
depositToday.toLocaleString()+" บาท";

document.getElementById("showStatus")
.innerHTML = status;

document.getElementById("result")
.style.display="block";

}

</script>

</body>
</html>
